version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: venturify_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-alpine
    container_name: venturify_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: venturify_django
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: venturify_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: venturify_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.development
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  ai_service:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: venturify_ai
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn ai_service.main:app --host 0.0.0.0 --port 8001 --reload

  realtime_service:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: venturify_realtime
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn realtime_service.main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  chroma_data: